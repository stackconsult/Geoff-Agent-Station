name: GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

# Suppress email notifications by limiting permissions
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: geoffswindowsenv
    
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          GITHUB_PAGES: true
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    # Override top-level permissions for deploy job
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
